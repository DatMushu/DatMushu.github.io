<!DOCTYPE html>
    <html lang="es">
        <head>
            <meta name="viewport" content="width=max-width initial-scale=1.0">
            <meta content="utf-8">
            <title>Encriptador de Texto</title>
            <link rel="stylesheet" href="css/reset.css">
            <link rel="stylesheet" href="css/base.css">
            <link rel="stylesheet" href="css/head.css">
            <link rel="stylesheet" href="css/contenedor.css">
            <link rel="stylesheet" href="css/footer.css">
        </head>
        <body>
            <header>
                <img src="/imagenes/logoalura.png" alt="Logo de alura con la inicial da letra a">
            </header>
            <main>
                <section>
                    <textarea class="input-texto" cols="40" rows="6" placeholder="Ingrese el texto aqui"></textarea>
                    <div id="div-desaparece">
                        <h6 class="informacion">Solo letras minúsculas y sin acentos.</h6>
                    </div>
                    <div class="botones">
                        <button class="encriptar" onclick="btnEncriptar()">
                            Encriptar
                        </button>
                        <button class="desencriptar" onclick="btnDesencriptar()">
                            Desencriptar
                        </button>
                    </div>
                </section>        
                <section class="mensaje-box">
                    <textarea class="mensaje" cols="18" rows="8"></textarea>
                    <button class="copiar" onclick="copiar()">Copiar</button>
                </section>        
            </main>
            <script src="script.js"></script>
        </body>        
    </html>
