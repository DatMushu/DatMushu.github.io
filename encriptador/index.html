<!DOCTYPE html>
    <html lang="es">
        <head>
            <meta name="viewport" content="width=max-width initial-scale=1.0">
            <meta content="utf-8">
            <title>Encriptador de Texto</title>
            <link rel="stylesheet" href="css/reset.css">
            <link rel="stylesheet" href="css/base.css">
            <link rel="stylesheet" href="css/head.css">
            <link rel="stylesheet" href="css/contenedor.css">
            <link rel="stylesheet" href="css/footer.css">
        </head>
    </html>
    <body class="light">
        <header>
            <img src="assets/logo.svg" alt="" class="head__logo">
            <h1>Encriptador de Texto</h1>
        </header>
        <main>
            <section class="contenedor">
                <input type="text" placeholder="Ingrese texto a encriptar" class="texto_sin_encriptar">
                <div class="seccion_derecha">
                    <input type="text" placeholder="aqui aparecera el texto encriptado" class="texto_encriptado">
                    <div class="botones">
                        <button class="boton_encriptar">Encriptar</button>
                        <button class="boton_copiar">Copiar</button>
                    </div>     
                </div>
            </section>
        </main>
        <footer>
            <p>Desarrollado por Manuel Diaz Vidal</p>
            <p>2023</p>
        </footer>
    </body>
